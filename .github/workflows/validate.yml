name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-places:
    name: Validate place_*.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Get changed place_*.md files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'place_.*\.md$' || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT
      - name: Validate changed files
        if: steps.changed.outputs.files != ''
        run: python3 scripts/validate.py ${{ steps.changed.outputs.files }}
      - name: No place_*.md files changed
        if: steps.changed.outputs.files == ''
        run: echo "No place_*.md files changed - skipping validation"
