name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-places:
    name: Validate place_*.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run place_*.md validator
        run: python3 scripts/validate_places.py
