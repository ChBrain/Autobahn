name: Build Claude.ai Zips

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deployable bundles
        run: |
          mkdir -p dist
          shopt -s nullglob
          # Manifests, not arbitrary place files. The road index is the
          # manifest for its road; nodes are bundle contents, not manifests.
          # `roads/*/place_*.md` would match every node and break the build.
          #
          # No --strict: per-road bundles don't carry the engine frame, and
          # the world bundle is single-hop (no nodes). Both will always have
          # cross-bundle links by design - they show as WARN in the log,
          # which is the intended signal level for that pattern.
          build() { python3 scripts/deploy.py "$1"; }
          build autobahn.md
          for road_dir in roads/*/; do
            road=$(basename "$road_dir")
            for stem in "place_${road}" "place_the_${road}"; do
              manifest="${road_dir}${stem}.md"
              [ -f "$manifest" ] && build "$manifest"
            done
          done
          for manifest in states/place_*.md; do
            [ -f "$manifest" ] && build "$manifest"
          done
          ls -la dist

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      - name: Upload as artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-zips
          path: dist/*.zip
          retention-days: 7
