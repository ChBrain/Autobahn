name: Build Claude.ai Zips

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deployable bundles
        run: |
          mkdir -p dist
          shopt -s nullglob
          # Every manifest produces one zip. Globs cover the three current
          # scopes; new manifests at these paths auto-build with no workflow change.
          for manifest in autobahn.md roads/*/place_*.md states/place_*.md; do
            [ -f "$manifest" ] || continue
            python3 scripts/deploy.py --strict "$manifest"
          done
          ls -la dist

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      - name: Upload as artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-zips
          path: dist/*.zip
          retention-days: 7
